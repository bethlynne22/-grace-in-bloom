<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grace in Bloom</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="home-stage" aria-label="Grace in Bloom home screen">
      <img src="assets/home-art.png" alt="Grace in Bloom storybook home screen with Liam, Mysti, Rye, animals, Bible, and leather buttons" class="home-art" />

      <button class="hotspot main bible" data-section="bible" aria-label="Open Bible"></button>
      <button class="hotspot main honey" data-section="honey" aria-label="Open Honey Drops"></button>
      <button class="hotspot main hebrew" data-section="hebrew" aria-label="Open Hebrew Garden"></button>
      <button class="hotspot main memory" data-section="memory" aria-label="Open Memory Garden"></button>
      <button class="hotspot main coloring" data-section="coloring" aria-label="Open Coloring Garden"></button>
      <button class="hotspot main comic" data-section="comic" aria-label="Open Comic Adventure"></button>
      <button class="hotspot main friends" data-section="friends" aria-label="Open Meet Friends"></button>
      <button class="hotspot main maps" data-section="maps" aria-label="Open Bible Maps"></button>
      <button class="hotspot main timeline" data-section="timeline" aria-label="Open Timeline"></button>
      <button class="hotspot main journal" data-section="journal" aria-label="Open Journal Corner"></button>
      <button class="hotspot main prayer" data-section="prayer" aria-label="Open Prayer Garden"></button>
      <button class="hotspot main artist" data-section="artist" aria-label="Open Artist Studio"></button>

      <button class="hotspot side verse" data-section="verse" aria-label="Open Today's Verse"></button>
      <button class="hotspot side side-honey" data-section="honey" aria-label="Open Honey Drops sidebar"></button>
      <button class="hotspot side binder" data-section="binder" aria-label="Open Study Binder"></button>
      <button class="hotspot side music" data-section="music" aria-label="Open Music Library"></button>
      <button class="hotspot side search" data-section="search" aria-label="Open Search"></button>
      <button class="hotspot side bookmarks" data-section="bookmarks" aria-label="Open Bookmarks"></button>
      <button class="hotspot side notes" data-section="notes" aria-label="Open Notes"></button>
      <button class="hotspot side calendar" data-section="calendar" aria-label="Open Calendar"></button>
      <button class="hotspot side settings" data-section="settings" aria-label="Open Settings"></button>
    </section>
  </main>

  <dialog id="panel" class="panel">
    <button id="closePanel" class="close" aria-label="Close">×</button>
    <div id="panelContent"></div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
