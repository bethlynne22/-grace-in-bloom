<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grace in Bloom — Button Calibration</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css?v=shell-v100-rc">
</head>
<body>
<main>
  <section class="notice">
    <b>Button Calibration Mode</b><br>
    Tap each colored box. Tell me which box is too high, low, left, or right.
  </section>

  <section class="home">
    <img src="home-art.png?v=shell-v100-rc" id="homeArt" alt="Grace in Bloom shell">

    <button class="hot genesis" data-panel="Genesis Study">Genesis</button>
    <button class="hot parallel" data-panel="WEB/CJB">WEB/CJB</button>
    <button class="hot honey" data-panel="Honey Drops">Honey</button>
    <button class="hot hebrew" data-panel="Hebrew Garden">Hebrew</button>
    <button class="hot memory" data-panel="Memory Garden">Memory</button>
    <button class="hot coloring" data-panel="Coloring Garden">Coloring</button>

    <button class="hot comic" data-panel="Comic Adventure">Comic</button>
    <button class="hot friends" data-panel="Forest Friends">Friends</button>
    <button class="hot maps" data-panel="Bible Maps">Maps</button>
    <button class="hot timeline" data-panel="Bible Timeline">Timeline</button>
    <button class="hot journal" data-panel="Journal">Journal</button>
    <button class="hot prayer" data-panel="Prayer">Prayer</button>
    <button class="hot artist" data-panel="Artist Studio">Artist</button>

    <button class="hot search" data-panel="Search">Search</button>
    <button class="hot favorites" data-panel="Favorites">Fav</button>
    <button class="hot groups" data-panel="Bible Groups">Groups</button>
    <button class="hot plans" data-panel="Reading Plans">Plans</button>

    <button class="hot bible" data-panel="Center Bible">Bible</button>
  </section>

  <section id="result" class="result">Tap a colored box.</section>
</main>

<script src="app.js?v=shell-v100-rc"></script>
</body>
</html>
